name: AutoCatalog Tests

on: [push, pull_request]  # Запускати тести при кожному push або PR

jobs:
  test:
    runs-on: ubuntu-latest  # Використовуємо віртуальну машину Ubuntu
    
    steps:
      # 1. Завантажуємо код репозиторію
      - uses: actions/checkout@v4

      # 2. Встановлюємо Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Встановлюємо залежності
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov selenium

      # 4. Запускаємо тести
      - name: Run tests
        run: pytest tests/ --cov=app
